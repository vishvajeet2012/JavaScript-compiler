# Build Electron app for Windows, Linux, macOS and publish GitHub Release
# Trigger: push a version tag like v1.0.0  OR  manual "Run workflow"

name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. 1.0.0) — package.json version is used if empty'
        required: false
        default: ''

permissions:
  contents: write

defaults:
  run:
    working-directory: javascript-compiler

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: javascript-compiler/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps

      # Signing: set CSC_LINK + CSC_KEY_PASSWORD repo secrets for SmartScreen-friendly builds.
      # If secrets are empty, builds stay unsigned (still publish + auto-update).
      - name: Build & publish (Windows)
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Only force-disable discovery when no cert secret is configured
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK == '' && 'false' || 'true' }}
        run: npx electron-builder --win --x64 --publish always

      - name: Build & publish (Linux)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --x64 --publish always

      - name: Build & publish (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK == '' && 'false' || 'true' }}
        run: npx electron-builder --mac --publish always
